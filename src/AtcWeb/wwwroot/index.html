<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Atc</title>
  <base href="/" />
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
  <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
  <link href="css/AtcWeb.min.css" rel="stylesheet" />
</head>

<body style="background-color: #0f0f1a; margin: 0;">
  <div id="app" class="full-page-height">
    <div class="atc-loader" style="background-color: #0f0f1a;">
      <img src="/images/atc-logo.svg" alt="ATC" width="300" height="300" />
      <p class="py-2"><span class="fas fa-spin fa-spinner" style="color: #776be7;"></span></p>
      <p class="app-loading-text">ATC loading...</p>
    </div>
  </div>


  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({
      startOnLoad: false,
      theme: 'dark',
      themeVariables: {
        background: '#0f0f1a',
        primaryColor: '#2a2a4a',
        primaryTextColor: '#c8c6d8',
        primaryBorderColor: '#776be7',
        secondaryColor: '#1e1e36',
        secondaryTextColor: '#c8c6d8',
        secondaryBorderColor: '#ff4081',
        tertiaryColor: '#16162a',
        tertiaryTextColor: '#c8c6d8',
        tertiaryBorderColor: '#1ec8a5',
        lineColor: '#776be7',
        textColor: '#c8c6d8',
        mainBkg: '#d4d2e8',
        nodeBorder: '#776be7',
        nodeTextColor: '#1a1a2e',
        clusterBkg: '#16162a',
        clusterBorder: '#1e1e36',
        titleColor: '#c8c6d8',
        edgeLabelBackground: '#16162a',
        nodeTextColor: '#c8c6d8',
      }
    });
    window.renderMermaidDiagrams = () => {
      const elements = document.querySelectorAll('pre.mermaid:not([data-processed])');
      if (elements.length > 0) {
        mermaid.run({ nodes: elements });
      }
    };
  </script>
  <script src="_framework/blazor.webassembly.js"></script>
  <script src="_content/MudBlazor/MudBlazor.min.js"></script>
</body>

</html>
