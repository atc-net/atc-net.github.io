<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Atc</title>
  <base href="/" />
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
  <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
  <link href="css/AtcWeb.min.css" rel="stylesheet" />
</head>

<body style="background-color: var(--mud-palette-background, #0f0f1a); margin: 0;">
  <div id="app" class="full-page-height">
    <div class="atc-loader" style="background-color: #0f0f1a;">
      <img src="/images/atc-logo.svg" alt="ATC" width="300" height="300" class="atc-loader-logo" />
      <div class="atc-loader-bar">
        <div class="atc-loader-bar-fill"></div>
      </div>
    </div>
  </div>


  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script>
    function getMermaidThemeConfig() {
      var isDark = document.body.classList.contains('mud-theme-dark') ||
                   document.querySelector('.mud-theme-dark') !== null;
      if (isDark) {
        return {
          theme: 'dark',
          themeVariables: {
            background: '#0f0f1a',
            primaryColor: '#2a2a4a',
            primaryTextColor: '#c8c6d8',
            primaryBorderColor: '#776be7',
            secondaryColor: '#1e1e36',
            secondaryTextColor: '#c8c6d8',
            secondaryBorderColor: '#ff4081',
            tertiaryColor: '#16162a',
            tertiaryTextColor: '#c8c6d8',
            tertiaryBorderColor: '#1ec8a5',
            lineColor: '#776be7',
            textColor: '#c8c6d8',
            mainBkg: '#d4d2e8',
            nodeBorder: '#776be7',
            nodeTextColor: '#1a1a2e',
            clusterBkg: '#16162a',
            clusterBorder: '#1e1e36',
            titleColor: '#c8c6d8',
            edgeLabelBackground: '#16162a',
          }
        };
      } else {
        return {
          theme: 'default',
          themeVariables: {
            background: '#F8F7FC',
            primaryColor: '#E8E6F0',
            primaryTextColor: '#2D2B42',
            primaryBorderColor: '#776be7',
            secondaryColor: '#F0EFF5',
            secondaryTextColor: '#4A4568',
            secondaryBorderColor: '#ff4081',
            tertiaryColor: '#FFFFFF',
            tertiaryTextColor: '#4A4568',
            tertiaryBorderColor: '#1ec8a5',
            lineColor: '#776be7',
            textColor: '#4A4568',
            mainBkg: '#E8E6F0',
            nodeBorder: '#776be7',
            nodeTextColor: '#2D2B42',
            clusterBkg: '#F0EFF5',
            clusterBorder: '#DDD9E9',
            titleColor: '#2D2B42',
            edgeLabelBackground: '#F8F7FC',
          }
        };
      }
    }

    mermaid.initialize(Object.assign({ startOnLoad: false }, getMermaidThemeConfig()));

    window.renderMermaidDiagrams = () => {
      var elements = document.querySelectorAll('pre.mermaid:not([data-processed])');
      if (elements.length > 0) {
        var config = getMermaidThemeConfig();
        mermaid.initialize(Object.assign({ startOnLoad: false }, config));
        mermaid.run({ nodes: elements });
      }
    };
  </script>
  <script src="_framework/blazor.webassembly.js"></script>
  <script src="_content/MudBlazor/MudBlazor.min.js"></script>
  <script>
    // Intercept MudBlazor clear-button clicks in the nav search field and handle
    // them in pure JS for instant feedback, then let Blazor catch up via oninput.
    document.addEventListener('mousedown', function (e) {
      var btn = e.target.closest('.nav-search-field .mud-input-clear-button');
      if (!btn) return;
      e.stopPropagation();
      e.preventDefault();
      var input = btn.closest('.nav-search-field').querySelector('input');
      if (input) {
        input.value = '';
        input.dispatchEvent(new Event('input', { bubbles: true }));
        input.dispatchEvent(new Event('change', { bubbles: true }));
        input.focus();
      }
    }, true);
  </script>
</body>

</html>
